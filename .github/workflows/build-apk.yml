name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger from the Actions tab on GitHub

jobs:
  build-apk:
    name: Build Android Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

            
      - name: Install Dependencies
              run: npm install --include=optional --platform=linux --arch=x64
              

      - name: Build Web Application
        run: npm run build

      - name: Add Android Platform Wrapper
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Web Code into Android Wrapper
        run: npx cap sync android

      - name: Grant Execute Permission to Gradle
        run: chmod +x android/gradlew

      - name: Build Android Debug APK with Gradle
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload Downloadable APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: JEE-Question-Timer-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
